  <script>
    var container = document.querySelector("#wrapper");
    function scaleContainer() {
      var e = window.innerWidth;
      container.style.transform = "scale(" + e / 1365 + ")";
    }
    ((document.getElementById("first-image").onload = function () {
      (scaleContainer(), (container.style.visibility = "visible"));
    }),
      window.addEventListener("resize", scaleContainer));

    // 动态生成 business-link
    (function renderLinks() {
      var wrapper = document.getElementById("wrapper");
      linkArr.forEach(function (link, index) {
        var pos = link.position || defaultPosition;
        var a = document.createElement("a");
        a.className = "business-link";
        a.style.top = pos.top + "px";
        a.style.left = pos.left + "px";
        a.style.width = pos.width + "px";
        a.style.height = pos.height + "px";
        a.style.borderRadius = (pos.radius || 0) + "px";
        a.innerText = link.eleName; // 可选：显示元素名称

        // 特色房源使用小程序跳转
        if (link.miniId) {
          a.href = "javascript:void(0)";
          a.addEventListener("click", function () {
            if (isInClient()) {
              callMiniProgram(link, function (res) {
                console.log("callMiniProgram res", res);
              });
            } else if (isInWechat()) {
              window.location.href = link.wxJumpUrl;
            }
          });
        } else {
          a.href = link.jumpUrl;
        }

        wrapper.appendChild(a);
      });
    })();

    // 微信鉴权初始化
    $(function () {
      openTagRequest("安鑫特色专区", "安鑫特色专区专属服务");
