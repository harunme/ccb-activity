      //实现限制用户经纬度功能
      function compareFloats(a, b) {
        // 转换为整数比较
        var precision = 100000000; // 定义一个足够大的整数
        a = parseInt(a * precision);
        b = parseInt(b * precision);

        return a > b; // 比较转换后的整数
      }

      //用户是否处于所给的经纬度范围内，入参四个点（围成四边形),point1(左下点)，point2(右上点)
      //处于四边形内的返回true，否则返回false
      function getPosition1(ltt, lgt, point1, point2) {
        return (
          compareFloats(ltt, point1.ltt) &&
          compareFloats(point2.ltt, ltt) &&
          compareFloats(lgt, point1.lgt) &&
          compareFloats(point2.lgt, lgt)
        );
      }

      function jumpWithLocate(ltt, lgt, ele) {
        if (getPosition1(ltt, lgt, ele.locationArea[0], ele.locationArea[1])) {
          if (isMiniprogram || isInClient() || window._isInMBS) {
            autoJumpLink(ele.jumpUrl, true);
          } else {
            //其他app打开跳落地页，如果不想跳落地页，而是目标页，请改location.href为ele.jumpUrl
            outJumpLink(location.href);
          }
        } else {
          myAlertinfo(ele.notlocationInfo);
        }
      }

      function myGetPosition(callback) {
        if (isInClient()) {
          getPosition((res) => {
            console.log("lqb:res", res);
            callback && callback(res);
          });
        } else {
          AMap.plugin("AMap.Geolocation", function () {
            var geolocation = new AMap.Geolocation({
              convert: true,
              enableHighAccuracy: true, // 是否使用高精度定位，默认：true
              timeout: 20000, // 设置定位超时时间，默认：无穷大
            });
            geolocation.getCurrentPosition(function (status, result) {
              console.log("lqb:amapResult", result);
              if (status == "complete") {
                let res = {};
                res.ltt = result.position.lat;
                res.lgt = result.position.lng;
                callback && callback(res);
              }
            });
          });
        }
      }

      //---------------------------点击事件---------------------------------------------------
      // let newDate0428 = Date.parse(new Date('2023/04/28 15:00:00'))
      // // console.log('时间', newDate0428, '当前', Date.parse(new Date()))
      // let nowtime = Date.parse(new Date())

      var nowdate = new Date().getDate();
      var ua = navigator.userAgent;
      var isWechat = /MicroMessenger/.test(ua);
      var isMiniprogram =
        navigator.userAgent && navigator.userAgent.indexOf("miniProgram") > -1;
      var isInMBS = window._isInMBS;

      function receiveCoupon(index) {
        var top = $(document).scrollTop();
        localStorage.setItem("subpage", top);
        console.log(index, linkArr[index].eleName);

        window.trackFun.call(this, "控件点击", {
          event_id: "beiketesezhuangqu_clk",
          event_name: `活动_${info.city}_${document.title}_链接入口_点击`,
          element_id: index + "",
          element_name: linkArr[index].eleName,
          platform_id: ccbCHValue ? ccbCHValue : "",
        });

        setTimeout(() => {
          //有alertInfo的就弹窗报错
          if (linkArr[index].alertInfo) {
            myAlertinfo(linkArr[index].alertInfo);
            return;
          } else if (isInMBS) {
            //手机银行下
            if (linkArr[index].mbsJumpUrl) {
              window.location.href = linkArr[index].mbsJumpUrl;
            } else {
              outJumpLink(location.href);
            }
          } else if (isInClient()) {
            if (
              isInClient() &&
              (linkArr[index].eleName === "打车" ||
                linkArr[index].eleName === "骑行")
            ) {
              // 端内
              window.location.href = linkArr[index].jumpUrl;
            } else if (linkArr[index].couponType == "jumpMini") {
              //app拉起小程序
              callMiniProgram(linkArr[index], (res) => {
                console.log("lqb:res", res);
              });
            } else {
              autoJumpLink(linkArr[index].jumpUrl);
            }
          } else if (isMiniprogram) {
            copyData(location.href);
          } else if (isWechat) {
            if (linkArr[index].wxJumpUrl) {
              window.location.href = linkArr[index].wxJumpUrl;
            } else {
              //没配微信跳转链接的，拉起建行生活cloudlink跳转到端内活动落地页
              outJumpLink(location.href);
            }
          } else {
            outJumpLink(location.href);
          }
        }, 300);
      }
    </script>
  </body>
</html>
